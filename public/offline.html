<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Offline | Ride Car Sharing</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f7f6ff; color: #1e2847; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .card { max-width: 400px; text-align: center; padding: 48px 32px; border-radius: 20px; background: #fff; box-shadow: 0 14px 32px rgba(135,82,254,.08); }
    h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 12px; }
    p { color: #6b7a9a; line-height: 1.6; margin-bottom: 24px; }
    a { display: inline-block; padding: 12px 28px; border-radius: 12px; background: linear-gradient(135deg, #8752FE, #6d3df2); color: #fff; text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
  <div class="card">
    <div style="font-size: 3rem; margin-bottom: 16px;">📡</div>
    <h1>You're offline</h1>
    <p>It looks like you've lost your internet connection. Check your network and try again.</p>
    <a href="/">Try Again</a>
  </div>
</body>
</html>
